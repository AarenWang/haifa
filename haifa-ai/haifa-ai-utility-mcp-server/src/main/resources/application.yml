server:
  port: ${UTILITY_MCP_PORT:8091}

spring:
  application:
    name: haifa-ai-utility-mcp-server
  ai:
    mcp:
      server:
        enabled: true
        name: haifa-utility
        version: 1.0.0-SNAPSHOT
        type: SYNC
        protocol: STATELESS
        request-timeout: 15s
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        streamable-http:
          mcp-endpoint: /mcp
          disallow-delete: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

haifa:
  ai:
    utility-mcp:
      target-result-bytes: 65536
      max-result-bytes: 262144
      proxy:
        url: ${UTILITY_MCP_PROXY_URL:${LLM_NETWORK_PROXY_URL:}}
        username: ${UTILITY_MCP_PROXY_USERNAME:${LLM_NETWORK_PROXY_USERNAME:}}
        password: ${UTILITY_MCP_PROXY_PASSWORD:${LLM_NETWORK_PROXY_PASSWORD:}}
        providers: ${UTILITY_MCP_PROXY_PROVIDERS:}
      security:
        allow-missing-origin: true
        allowed-origins: []
        requests-per-minute: 120
